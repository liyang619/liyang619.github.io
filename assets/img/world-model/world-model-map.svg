<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">World model taxonomy matrix</title>
  <desc id="desc">A taxonomy matrix for the tutorial: columns separate action conditioning, while rows separate what the model predicts.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .titleBox { fill: #111827; rx: 24; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .head { fill: #eaf3ff; stroke: #9cc8f2; stroke-width: 2; rx: 14; }
      .rowHead { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .cell { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.8; rx: 14; }
      .good { fill: #effaf3; stroke: #85c99f; }
      .warn { fill: #fff7e8; stroke: #e6b365; }
      .latent { fill: #f4f0ff; stroke: #aa91e8; }
      .blue { fill: #eef6ff; stroke: #8bbdf0; }
      .mainTitle { fill: #ffffff; font: 700 30px Arial, sans-serif; text-anchor: middle; }
      .mainSub { fill: #dbeafe; font: 18px Arial, sans-serif; text-anchor: middle; }
      .h1 { fill: #0f172a; font: 700 21px Arial, sans-serif; text-anchor: middle; }
      .h2 { fill: #334155; font: 17px Arial, sans-serif; text-anchor: middle; }
      .r1 { fill: #0f172a; font: 700 20px Arial, sans-serif; }
      .r2 { fill: #64748b; font: 16px Arial, sans-serif; }
      .txt { fill: #334155; font: 17px Arial, sans-serif; }
      .small { fill: #64748b; font: 15px Arial, sans-serif; }
      .tag { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; rx: 10; }
      .tagText { fill: #475569; font: 14px Arial, sans-serif; text-anchor: middle; }
      .note { fill: #0f172a; font: 17px Arial, sans-serif; }
      .arrow { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="980"/>

  <rect class="titleBox" x="250" y="35" width="1000" height="105"/>
  <text class="mainTitle" x="750" y="78">World Model Taxonomy for This Tutorial</text>
  <text class="mainSub" x="750" y="111">Two independent questions: does it condition on action, and what future object does it predict?</text>

  <rect class="panel" x="55" y="175" width="1390" height="690"/>

  <!-- Column headers -->
  <rect class="head" x="250" y="205" width="270" height="88"/>
  <text class="h1" x="385" y="238">No explicit action</text>
  <text class="h2" x="385" y="266">passive future prediction</text>

  <rect class="head" x="535" y="205" width="270" height="88"/>
  <text class="h1" x="670" y="238">Action-conditioned</text>
  <text class="h2" x="670" y="266">counterfactual control</text>

  <rect class="head" x="820" y="205" width="270" height="88"/>
  <text class="h1" x="955" y="238">Latent / learned action</text>
  <text class="h2" x="955" y="266">from unlabeled videos</text>

  <rect class="head" x="1105" y="205" width="270" height="88"/>
  <text class="h1" x="1240" y="238">Joint action + world</text>
  <text class="h2" x="1240" y="266">policy and imagination merge</text>

  <!-- Row headers -->
  <rect class="rowHead" x="85" y="315" width="145" height="98"/>
  <text class="r1" x="105" y="352">Pixels / video</text>
  <text class="r2" x="105" y="380">future frames</text>

  <rect class="rowHead" x="85" y="428" width="145" height="98"/>
  <text class="r1" x="105" y="465">Latent repr.</text>
  <text class="r2" x="105" y="493">future state</text>

  <rect class="rowHead" x="85" y="541" width="145" height="98"/>
  <text class="r1" x="105" y="578">Structured</text>
  <text class="r2" x="105" y="606">joints / BEV / graph</text>

  <rect class="rowHead" x="85" y="654" width="145" height="98"/>
  <text class="r1" x="105" y="691">3D / physics</text>
  <text class="r2" x="105" y="719">space or simulator</text>

  <!-- Pixel/video row -->
  <rect class="cell blue" x="250" y="315" width="270" height="98"/>
  <text class="txt" x="273" y="350">Video generation models</text>
  <text class="small" x="273" y="378">Sora, Veo, passive prediction</text>

  <rect class="cell good" x="535" y="315" width="270" height="98"/>
  <text class="txt" x="558" y="350">Action-conditioned video WM</text>
  <text class="small" x="558" y="378">DIAMOND, UniSim, Cosmos Predict</text>

  <rect class="cell warn" x="820" y="315" width="270" height="98"/>
  <text class="txt" x="843" y="350">Playable / controllable video</text>
  <text class="small" x="843" y="378">Genie, latent action models</text>

  <rect class="cell warn" x="1105" y="315" width="270" height="98"/>
  <text class="txt" x="1128" y="350">Video + action generation</text>
  <text class="small" x="1128" y="378">Motus, DreamZero / WAM</text>

  <!-- Latent row -->
  <rect class="cell latent" x="250" y="428" width="270" height="98"/>
  <text class="txt" x="273" y="463">Self-supervised prediction</text>
  <text class="small" x="273" y="491">I-JEPA / V-JEPA style</text>

  <rect class="cell latent" x="535" y="428" width="270" height="98"/>
  <text class="txt" x="558" y="463">Latent dynamics for RL</text>
  <text class="small" x="558" y="491">PlaNet, Dreamer, TD-MPC2</text>

  <rect class="cell latent" x="820" y="428" width="270" height="98"/>
  <text class="txt" x="843" y="463">Video-action latent space</text>
  <text class="small" x="843" y="491">DreamDojo, Motus pretraining</text>

  <rect class="cell latent" x="1105" y="428" width="270" height="98"/>
  <text class="txt" x="1128" y="463">Unified policy/world latent</text>
  <text class="small" x="1128" y="491">WAM as policy backbone</text>

  <!-- Structured row -->
  <rect class="cell" x="250" y="541" width="270" height="98"/>
  <text class="txt" x="273" y="576">World-state forecasting</text>
  <text class="small" x="273" y="604">when actions are absent/implicit</text>

  <rect class="cell good" x="535" y="541" width="270" height="98"/>
  <text class="txt" x="558" y="576">Control-friendly dynamics</text>
  <text class="small" x="558" y="604">RWM, RWM-U, occupancy WM</text>

  <rect class="cell" x="820" y="541" width="270" height="98"/>
  <text class="txt" x="843" y="576">Inverse dynamics bridge</text>
  <text class="small" x="843" y="604">learn action labels or affordances</text>

  <rect class="cell warn" x="1105" y="541" width="270" height="98"/>
  <text class="txt" x="1128" y="576">Action head + state head</text>
  <text class="small" x="1128" y="604">future action and future state</text>

  <!-- 3D / physics row -->
  <rect class="cell blue" x="250" y="654" width="270" height="98"/>
  <text class="txt" x="273" y="689">Persistent 3D world</text>
  <text class="small" x="273" y="717">World Labs Marble, NeRF / 3DGS</text>

  <rect class="cell good" x="535" y="654" width="270" height="98"/>
  <text class="txt" x="558" y="689">Physics simulator step</text>
  <text class="small" x="558" y="717">MuJoCo, Isaac, Genesis, Drake</text>

  <rect class="cell" x="820" y="654" width="270" height="98"/>
  <text class="txt" x="843" y="689">Learned interaction primitive</text>
  <text class="small" x="843" y="717">latent contact / affordance action</text>

  <rect class="cell warn" x="1105" y="654" width="270" height="98"/>
  <text class="txt" x="1128" y="689">Embodied foundation model</text>
  <text class="small" x="1128" y="717">world, action, language together</text>

  <!-- Notes -->
  <rect class="tag" x="250" y="790" width="210" height="38"/>
  <text class="tagText" x="355" y="814">broad world model</text>
  <rect class="tag" x="535" y="790" width="230" height="38"/>
  <text class="tagText" x="650" y="814">narrow robotics / RL WM</text>
  <rect class="tag" x="820" y="790" width="235" height="38"/>
  <text class="tagText" x="937" y="814">uses video without action labels</text>
  <rect class="tag" x="1105" y="790" width="235" height="38"/>
  <text class="tagText" x="1222" y="814">toward world action model</text>

  <text class="note" x="95" y="910">How to read this tutorial:</text>
  <text class="small" x="285" y="910">Sora can sit in broad video world models; Dreamer/RWM are action-conditioned dynamics; Genie learns latent actions; WAM predicts both future world and future action.</text>
</svg>
