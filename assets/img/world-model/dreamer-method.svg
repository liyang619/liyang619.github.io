<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="430" viewBox="0 0 1300 430" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#334155"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.m{fill:#eef6ff;stroke:#84bbed;stroke-width:2;rx:14}.p{fill:#effaf3;stroke:#78c59b;stroke-width:2;rx:14}.t{fill:#0f172a;font:700 24px Arial}.s{fill:#334155;font:18px Arial}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect class="bg" width="1300" height="430"/><text class="t" x="55" y="55">Dreamer-style latent imagination</text><rect class="b" x="55" y="110" width="170" height="80"/><text class="s" x="88" y="143">real replay</text><text class="s" x="82" y="168">o, a, r</text><path class="l" d="M225 150 L295 150"/><rect class="m" x="295" y="105" width="190" height="90"/><text class="s" x="340" y="140">encoder</text><text class="s" x="325" y="166">pixels -&gt; latent</text><path class="l" d="M485 150 L560 150"/><rect class="m" x="560" y="90" width="210" height="120"/><text class="s" x="610" y="130">RSSM</text><text class="s" x="598" y="158">latent dynamics</text><text class="s" x="595" y="184">z_t,a_t -&gt; z_t+1</text><path class="l" d="M770 150 L850 150"/><rect class="p" x="850" y="95" width="190" height="110"/><text class="s" x="890" y="132">imagination</text><text class="s" x="895" y="158">rollouts</text><text class="s" x="885" y="184">reward/value</text><path class="l" d="M1040 150 L1120 150"/><rect class="p" x="1120" y="110" width="140" height="80"/><text class="s" x="1165" y="143">actor</text><text class="s" x="1155" y="168">critic</text><path class="l" d="M1190 190 C1140 310 920 320 740 230"/><text class="s" x="830" y="335">policy is trained inside predicted latent futures</text></svg>
