<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="430" viewBox="0 0 1300 430" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#334155"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.m{fill:#fff7e8;stroke:#e3ad64;stroke-width:2;rx:14}.p{fill:#effaf3;stroke:#78c59b;stroke-width:2;rx:14}.t{fill:#0f172a;font:700 24px Arial}.s{fill:#334155;font:18px Arial}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect class="bg" width="1300" height="430"/><text class="t" x="55" y="55">RWM / RWM-U: make learned rollout usable for robot policy training</text><rect class="b" x="65" y="118" width="190" height="95"/><text class="s" x="103" y="153">state + action</text><text class="s" x="116" y="180">sequence</text><path class="l" d="M255 165 L335 165"/><rect class="m" x="335" y="105" width="230" height="120"/><text class="s" x="370" y="142">self-forcing</text><text class="s" x="363" y="170">train on own</text><text class="s" x="378" y="197">rollouts</text><path class="l" d="M565 165 L645 165"/><rect class="m" x="645" y="105" width="220" height="120"/><text class="s" x="690" y="142">ensemble</text><text class="s" x="675" y="170">uncertainty</text><text class="s" x="675" y="197">penalty</text><path class="l" d="M865 165 L945 165"/><rect class="p" x="945" y="120" width="230" height="90"/><text class="s" x="990" y="153">policy learns</text><text class="s" x="985" y="180">inside model</text><text class="s" x="290" y="320">Goal: reduce long-horizon drift and stop the policy from exploiting model errors.</text></svg>
